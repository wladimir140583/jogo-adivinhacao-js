<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Adivinhação</title>
  <link rel="stylesheet" href="atv1.css">
</head>

<body>
  <main>
    <h1>Jogo de Adivinhação</h1>

    <div class="info">
      <p>Tente adivinhar o número secreto entre 1 e 100.</p>
      <p>Valendo 1 Milhão de Reais</p>
    </div>

    <div class="entrada">
      <input type="number" id="palpite" placeholder="Digite seu palpite">
    </div>

    <div class="acoes">
      <button id="botaoChutar">Chutar</button>
      <button id="reiniciar" disabled>Reiniciar</button>
    </div>

    <div class="feedback">
      <p id="mensagem"></p>
      <p id="tentativas"></p>
      <p id="resultado"></p>
    </div>
  </main>

  <script src="js/atv1.js"></script>
</body>
